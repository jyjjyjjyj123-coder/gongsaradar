<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta httpEquiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>공사인프라</title>
    <style>
      html, body, #root { width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden; }
      body { background: #0a0f1e; }
    </style>
    <!-- 카카오맵 SDK 미리 로드 -->
    <script>
      window._kakaoMapLoaded = false;
      window._kakaoMapCallbacks = [];
    </script>
    <script
      type="text/javascript"
      src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=73f11ce9d95c10a50b4ece327140f178&libraries=services,clusterer&autoload=false"
      onload="window.kakao.maps.load(function(){ window._kakaoMapLoaded=true; window._kakaoMapCallbacks.forEach(function(fn){fn();}); window._kakaoMapCallbacks=[]; })"
    ></script>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
